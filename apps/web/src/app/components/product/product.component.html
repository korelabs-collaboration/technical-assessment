<div class="container mx-auto" *ngIf="product$ | async as product">
  <div class="bg-white shadow-xl rounded-lg overflow-hidden mb-4">
    <div class="bg-gradient-to-r from-slate-900 to-slate-500 p-4">
      <h2 class="text-lg font-bold text-white">{{ product.name }}</h2>
      <div class="flex justify-between -mx-4">
        <span class="mx-4 text-xs text-white opacity-75">{{ product.id }}</span>
        <span class="mx-4 text-xs text-white opacity-75">{{ product.updatedAt | date: "dd/MM/yyyy HH:mm" }}</span>
      </div>
    </div>
    <div class="p-6 flex justify-between -mx-4">
      <div class="mx-4 mb-4">
        <ng-container *ngFor="let property of product.properties | keyvalue">
          <label class="block text-slate-600 text-sm font-bold mb-1 capitalize">{{ property.key }}</label>
          <p class="text-slate-900">{{ property.value }}</p>
        </ng-container>
      </div>
      <div class="items-right px-4 py-3">
        <button id="createTaskBtn" (click)="openTaskModal()" class="px-4 py-2 bg-gradient-to-r from-slate-900 to-slate-500 text-white text-base font-medium rounded-md mr-2">Create Task</button>
      </div>
    </div>
  </div>
  <app-table-component
      [columns]="columns"
      [data]="product.tasks"
      [showDeleteOption]="true"
      [showEditOption]="true"
      (rowClicked)="onTaskClick($event)"
      (deleteClicked)="onDeleteTask($event.item, $event.event)"
      (editClicked)="onEditTask($event.item, $event.event)"
  ></app-table-component>
  <app-task-modal 
      [isOpen]="isTaskModalOpen" 
      [task]="taskModalInput"
      [operation]="operation"
      (closeModal)="onCloseTaskModal()"
      (saveTask)="onSaveTask($event)">
    </app-task-modal>
    <app-confirmation-dialog 
      [isDialogOpen]="isConfirmationDialogOpen"
      [title]="'Delete Task'" 
      [message]="'Are you sure you want to delete this task?'" 
      (confirm)="onConfirm()" 
      (cancel)="onCancel()">
  </app-confirmation-dialog>
</div>
