@if (isDialogOpen) {
  <div class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex justify-center items-center">
    <div class="p-5 border w-96 shadow-lg rounded-md bg-white">
      <div class="text-center">
        <h3 class="text-lg leading-6 font-medium">{{ title }}</h3>
        <div class="mt-2 px-7 py-3">
          <p class="text-sm">{{ message }}</p>
        </div>
        <div class="items-center px-4 py-3">
          <button (click)="confirmAction()" class="px-4 py-2 bg-gradient-to-r from-slate-900 to-slate-500 text-white text-base font-medium rounded-md mr-2">Yes</button>
          <button (click)="cancelAction()" class="px-4 py-2 bg-red-500 text-white text-base font-medium rounded-md">No</button>
        </div>
      </div>
    </div>
  </div>
}
