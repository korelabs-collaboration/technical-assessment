@if(data) {
    <table class="min-w-full bg-white">
      <thead>
        <tr class="bg-gradient-to-r from-slate-900 to-slate-500 text-white">
          <th *ngFor="let column of columns" class="p-4 text-lg text-left">{{ column.header }}</th>
          <th class="p-4 text-lg text-left">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let item of data"
          (click)="onRowClick(item)"
          class="cursor-pointer transition duration-300 ease-in-out hover:bg-slate-100"
        >
          <td *ngFor="let column of columns" class="p-4 border-b">
            @if (column.type === 'date') {
              {{ item[column.field] | date: "dd/MM/yyyy" }}
            } @else {
              {{ item[column.field] }}
            }
          </td>
          <td class="p-4 border-b">
            @if(showEditOption) {
              <button class="m-2" (click)="onEditClick(item, $event)">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-6 text-blue-500"
                >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16.862 4.487l1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487zm0 0L19.5 7.125"
                />
              </svg>
              </button>
            }
            @if(showDeleteOption) {
              <button (click)="onDeleteClick(item, $event)">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-6 text-red-700"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                  />
                </svg>
              </button>
            }         
          </td>
        </tr>
      </tbody>
    </table>
  }
